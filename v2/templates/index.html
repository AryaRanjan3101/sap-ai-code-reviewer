<!DOCTYPE html>
  <html lang="en">
  <head>    
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>SAP ABAP Code Reviewer</title>
      <style>
          body { font-family: Arial, sans-serif; max-width: 1200px; margin: 40px auto; padding: 0 20px;
  background: #f5f5f5; }
          h1 { color: #0070f3; }
          textarea { width: 100%; height: 300px; font-family: monospace; font-size: 14px; padding: 10px; border:
   1px solid #ccc; border-radius: 4px; }
          button { margin-top: 10px; padding: 12px 30px; background: #0070f3; color: white; border: none;
  border-radius: 4px; cursor: pointer; font-size: 16px; }
          button:hover { background: #0051a8; }
          #result { margin-top: 30px; background: white; padding: 20px; border-radius: 4px; border: 1px solid
  #ddd; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
          #loading { display: none; margin-top: 10px; color: #666; }
      </style>
  </head>   
  <body>
      <h1>SAP ABAP Code Reviewer</h1>
      <p>Paste your ABAP code below and get an AI-powered review instantly.</p>
      <textarea id="code" placeholder="Paste your ABAP code here..."></textarea>
      <br>  
      <button onclick="reviewCode()">Review Code</button>
      <p id="loading">Reviewing your code, please wait...</p>
      <div id="result"></div>   

      <script>
          async function reviewCode() {
              const code = document.getElementById('code').value;
              const resultDiv = document.getElementById('result');
              const loading = document.getElementById('loading');

              if (!code.trim()) {
                  alert('Please paste some ABAP code first.');
                  return;
              }

              loading.style.display = 'block';
              resultDiv.innerHTML = '';

              const response = await fetch('/review', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ code })
              });
  
              const data = await response.json();
              loading.style.display = 'none';
              resultDiv.innerHTML = data.review || data.error;
          }
      </script>
  </body>
  </html>
